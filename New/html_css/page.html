<!DOCTYPE html>
<html>
    <head>
        <title>Page</title>
        <style>
            .container {
                display: flex;
                justify-content: space-around;
                align-items: center;
                gap: 20px;
            }

            .card {
                margin: 30px;
                padding: 10px;
                border: 7px solid black;
            }

            #first-button{
                color: white;
                background-color: blue;
                border: 5px solid black;
                padding: 10px;
                border-radius: 10px;
            }

            #first-button:hover {
                background-color: green;
            }
        </style>
    </head>
    <body>
        <header></header>
        <main>
            <div class="container">
            <div class="card">One</div>
            <div class="card">Two</div>
            <div class="card">Three</div>
        </div>
        </main>
        <footer>
            <button id="first-button">Button</button>
        </footer>
    </body>
</html>
