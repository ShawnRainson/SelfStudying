<!DOCTYPE html>
<html>
    <head>
        <title>My card</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>My way to IT</h1>
            
            <p class="success">College graduating!</p>
            <p class="in-progress">Daily tasks with AI!</p>
            
            <div id="author-signature">Shawn Rainson</div>
            
            <input type="text" id="task-input" placeholder="Enter task">
            
            <button onclick="takeTask()">Enter</button>
        </div>
        

        <script>
            function takeTask() {
                let inputTask = document.getElementById('task-input');
                let task = inputTask.value;
                console.log(`User entered: ${task}`);

            }
        </script>
    </body>
</html>
